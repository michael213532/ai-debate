<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beecision - AI Models Debate, You Decide</title>
    <meta name="description" content="Get multiple AI models to debate any topic and reach a consensus. Compare responses from ChatGPT, Claude, Gemini, and more - all in one place.">
    <meta name="keywords" content="AI debate, AI comparison, ChatGPT, Claude, Gemini, AI models, artificial intelligence">

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Beecision - AI Models Debate, You Decide">
    <meta property="og:description" content="Get multiple AI models to debate any topic and reach a consensus. Compare responses from ChatGPT, Claude, Gemini, and more.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://beecision.com">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Beecision - AI Models Debate, You Decide">
    <meta name="twitter:description" content="Get multiple AI models to debate any topic and reach a consensus.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%236366f1'%3E🐝%3C/text%3E%3C/svg%3E">
    <script>if(localStorage.getItem('token'))window.location.replace('/app');</script>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
    <style>
        .landing-container {
            min-height: 100vh;
            display: flex;
        }

        /* Left side - Hero */
        .hero-section {
            flex: 1;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        [data-theme="dark"] .hero-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: pulse-bg 15s ease-in-out infinite;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .hero-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .hero-title span {
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-description {
            font-size: 1.35rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .hero-features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .hero-tagline {
            font-size: 1.25rem;
            font-style: italic;
            color: var(--text-secondary);
            opacity: 0.9;
        }

        .hero-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 0.8rem;
        }

        /* Right side - Auth */
        .auth-section {
            width: 480px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--surface);
        }

        .auth-header {
            margin-bottom: 32px;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
        }

        .auth-form {
            margin-bottom: 24px;
        }

        .auth-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary-color);
            font-weight: 500;
        }

        .signup-link,
        .login-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            color: white !important;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            margin-left: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .signup-link:hover,
        .login-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }

        .use-cases {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
        }

        .use-cases-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .use-case-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .use-case-tag {
            padding: 6px 12px;
            background: var(--surface-light);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 968px) {
            .landing-container {
                flex-direction: column;
            }

            .hero-section {
                padding: 40px 24px;
            }

            .hero-title {
                font-size: 2.25rem;
            }

            .auth-section {
                width: 100%;
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-content">
                <div class="hero-logo">
                    <img src="/logo.png" alt="Beecision" style="width: 120px; height: 120px;">
                    <span>Beecision</span>
                </div>

                <h1 class="hero-title">
                    AI Models Debate<br>
                    <span>You Decide</span>
                </h1>

                <p class="hero-description">
                    Ask once  Every model responds
                </p>

                <div class="hero-features">
                    <div class="hero-feature">
                        <div class="feature-icon">🔍</div>
                        <span>Watch them argue</span>
                    </div>
                    <div class="hero-feature">
                        <div class="feature-icon">⚖️</div>
                        <span>Compare their logic</span>
                    </div>
                    <div class="hero-feature">
                        <div class="feature-icon">🎯</div>
                        <span>Make up your mind</span>
                    </div>
                </div>

                <p class="hero-tagline">
                    A million bees can't be wrong
                </p>

            </div>
        </div>

        <!-- Auth Section -->
        <div class="auth-section">
            <div class="auth-header">
                <h2 class="auth-title" id="auth-title">Get Started</h2>
                <p class="auth-subtitle" id="auth-subtitle">Create your free account</p>
            </div>

            <div id="alert" class="alert" style="display: none;"></div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner" style="display: none;"></span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="register-email">Email</label>
                    <input type="email" id="register-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-password">Password</label>
                    <input type="password" id="register-password" class="form-input" placeholder="Create a password (min 6 characters)" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" class="form-input" placeholder="Confirm your password" required>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label class="checkbox-label" style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="privacy-checkbox" required style="margin-top: 4px; width: 18px; height: 18px; cursor: pointer;">
                        <span style="font-size: 0.9rem; color: var(--text-secondary);">
                            I have read and accept the <a href="/privacy" target="_blank" style="color: var(--primary-color);">Privacy Policy</a>, including how my API keys are stored and used.
                        </span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner" style="display: none;"></span>
                </button>
            </form>

            <div class="auth-footer">
                <span id="auth-toggle-text">Already have an account?</span>
                <a href="#" id="auth-toggle-link" class="login-link">Log in</a>
            </div>

            <div style="margin-top: 24px; text-align: center;">
                <a href="/privacy" style="color: var(--text-secondary); font-size: 0.85rem;">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
