<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(location.hostname==='beecision.com')location.hostname='www.beecision.com';</script>
    <title>Sign Up - Beecision</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='11' r='10' fill='%23FFD700'/%3E%3Ccircle cx='16' cy='21' r='10' fill='%23222222'/%3E%3C/svg%3E">
    <script>if(localStorage.getItem('token'))window.location.replace('/');</script>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            padding: 24px;
        }

        .auth-container {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            text-align: center;
        }

        .auth-container .form-group {
            text-align: left;
        }

        .auth-container .btn {
            justify-content: center;
        }

        .auth-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 16px;
        }

        .auth-footer a {
            color: var(--primary-color);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div id="alert" class="alert" style="display: none;"></div>

        <!-- Step 1: Email only -->
        <div id="email-step">
            <div class="form-group">
                <label class="form-label" for="user-email">Email</label>
                <input type="email" id="user-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <button type="button" id="continue-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Create account
            </button>
            <div class="auth-footer">
                <span>Already have an account?</span>
                <a href="#" id="show-login-link">Log in</a>
            </div>
        </div>

        <!-- Step 2: Password fields (hidden initially) -->
        <div id="password-step" style="display: none;">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="display-email" class="form-input" disabled>
            </div>
            <div class="form-group">
                <label class="form-label" for="register-password">Password</label>
                <input type="password" id="register-password" class="form-input" placeholder="Create a password (min 6 characters)" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label" for="register-confirm">Confirm Password</label>
                <input type="password" id="register-confirm" class="form-input" placeholder="Confirm your password" required>
            </div>
            <div class="form-group" style="margin-top: 16px;">
                <label class="checkbox-label" style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="privacy-checkbox" required style="margin-top: 4px; width: 18px; height: 18px; cursor: pointer;">
                    <span style="font-size: 0.9rem; color: var(--text-secondary);">
                        I accept the <a href="/privacy" target="_blank" style="color: var(--primary-color);">Privacy Policy</a>
                    </span>
                </label>
            </div>
            <button type="button" id="register-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                <span class="btn-text">Create account</span>
                <span class="spinner" style="display: none;"></span>
            </button>
        </div>

        <!-- Login Form (hidden initially) -->
        <form id="login-form" class="auth-form" style="display: none;">
            <div class="form-group">
                <label class="form-label" for="login-email">Email</label>
                <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <input type="password" id="login-password" class="form-input" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                <span class="btn-text">Sign in</span>
                <span class="spinner" style="display: none;"></span>
            </button>
            <div class="auth-footer">
                <a href="#" id="forgot-password-link" style="display: block; margin-bottom: 8px;">Forgot password?</a>
                <span>Don't have an account?</span>
                <a href="#" id="show-register-link">Sign up</a>
            </div>
        </form>

        <!-- Forgot Password: Enter Email -->
        <div id="forgot-step" style="display: none;">
            <h3 style="margin: 0 0 4px; color: var(--text-primary);">Reset password</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0 0 16px;">We'll send a code to your email</p>
            <div class="form-group">
                <label class="form-label" for="forgot-email">Email</label>
                <input type="email" id="forgot-email" class="form-input" placeholder="you@example.com" required>
            </div>
            <button type="button" id="send-code-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                <span class="btn-text">Send code</span>
                <span class="spinner" style="display: none;"></span>
            </button>
            <div class="auth-footer">
                <a href="#" id="back-to-login-link">Back to login</a>
            </div>
        </div>

        <!-- Forgot Password: Enter Code + New Password -->
        <div id="reset-step" style="display: none;">
            <h3 style="margin: 0 0 4px; color: var(--text-primary);">Check your email</h3>
            <p id="reset-email-hint" style="color: var(--text-secondary); font-size: 0.9rem; margin: 0 0 16px;">Enter the 6-digit code we sent</p>
            <div class="form-group">
                <label class="form-label" for="reset-code">Code</label>
                <input type="text" id="reset-code" class="form-input" placeholder="000000" maxlength="6" style="text-align: center; font-size: 1.3rem; letter-spacing: 6px;" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="new-password">New password</label>
                <input type="password" id="new-password" class="form-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label" for="new-password-confirm">Confirm password</label>
                <input type="password" id="new-password-confirm" class="form-input" placeholder="Confirm new password" required>
            </div>
            <button type="button" id="reset-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                <span class="btn-text">Reset password</span>
                <span class="spinner" style="display: none;"></span>
            </button>
            <div class="auth-footer">
                <a href="#" id="resend-code-link">Resend code</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Multi-step form logic
        const emailStep = document.getElementById('email-step');
        const passwordStep = document.getElementById('password-step');
        const loginForm = document.getElementById('login-form');
        const userEmail = document.getElementById('user-email');
        const displayEmail = document.getElementById('display-email');
        const continueBtn = document.getElementById('continue-btn');
        const registerBtn = document.getElementById('register-btn');
        const showLoginLink = document.getElementById('show-login-link');
        const showRegisterLink = document.getElementById('show-register-link');

        continueBtn.addEventListener('click', () => {
            if (userEmail.value && userEmail.checkValidity()) {
                displayEmail.value = userEmail.value;
                emailStep.style.display = 'none';
                passwordStep.style.display = 'block';
            } else {
                userEmail.reportValidity();
            }
        });

        userEmail.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                continueBtn.click();
            }
        });

        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            emailStep.style.display = 'none';
            passwordStep.style.display = 'none';
            loginForm.style.display = 'block';
        });

        showRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            passwordStep.style.display = 'none';
            emailStep.style.display = 'block';
        });

        // Auto-show register form if #register hash
        if (window.location.hash === '#register') {
            loginForm.style.display = 'none';
            passwordStep.style.display = 'none';
            emailStep.style.display = 'block';
        }

        registerBtn.addEventListener('click', async () => {
            const email = displayEmail.value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const privacy = document.getElementById('privacy-checkbox').checked;

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            if (!privacy) {
                showAlert('Please accept the privacy policy', 'error');
                return;
            }

            registerBtn.querySelector('.btn-text').style.display = 'none';
            registerBtn.querySelector('.spinner').style.display = 'inline-block';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/';
                } else {
                    showAlert(data.detail || 'Registration failed', 'error');
                }
            } catch (err) {
                showAlert('Network error', 'error');
            }

            registerBtn.querySelector('.btn-text').style.display = 'inline';
            registerBtn.querySelector('.spinner').style.display = 'none';
        });

        // --- Forgot Password Flow ---
        const forgotStep = document.getElementById('forgot-step');
        const resetStep = document.getElementById('reset-step');
        let resetEmail = '';

        function showStep(step) {
            hideAlert();
            [emailStep, passwordStep, loginForm, forgotStep, resetStep].forEach(s => s.style.display = 'none');
            step.style.display = 'block';
        }

        document.getElementById('forgot-password-link').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('forgot-email').value = document.getElementById('login-email').value || '';
            showStep(forgotStep);
        });

        document.getElementById('back-to-login-link').addEventListener('click', (e) => {
            e.preventDefault();
            showStep(loginForm);
        });

        document.getElementById('send-code-btn').addEventListener('click', async () => {
            const emailInput = document.getElementById('forgot-email');
            if (!emailInput.value || !emailInput.checkValidity()) {
                emailInput.reportValidity();
                return;
            }
            resetEmail = emailInput.value;
            const btn = document.getElementById('send-code-btn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed to send code');
                document.getElementById('reset-email-hint').textContent = `Enter the 6-digit code sent to ${resetEmail}`;
                showStep(resetStep);
            } catch (err) {
                showAlert(err.message, 'error');
            } finally {
                setLoading(btn, false);
            }
        });

        document.getElementById('forgot-email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('send-code-btn').click(); }
        });

        document.getElementById('resend-code-link').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail })
                });
                showAlert('New code sent!', 'success');
            } catch (err) {
                showAlert('Failed to resend code', 'error');
            }
        });

        document.getElementById('reset-btn').addEventListener('click', async () => {
            const code = document.getElementById('reset-code').value.trim();
            const pw = document.getElementById('new-password').value;
            const pw2 = document.getElementById('new-password-confirm').value;

            if (code.length !== 6) { showAlert('Enter the 6-digit code', 'error'); return; }
            if (pw.length < 6) { showAlert('Password must be at least 6 characters', 'error'); return; }
            if (pw !== pw2) { showAlert('Passwords do not match', 'error'); return; }

            const btn = document.getElementById('reset-btn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, code, new_password: pw })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Reset failed');
                showStep(loginForm);
                document.getElementById('login-email').value = resetEmail;
                showAlert('Password reset! You can now sign in.', 'success');
            } catch (err) {
                showAlert(err.message, 'error');
            } finally {
                setLoading(btn, false);
            }
        });
    </script>
</body>
</html>
