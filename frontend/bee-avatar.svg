<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Single cute bee -->
  <circle cx="50" cy="50" r="48" fill="#FFF8E7"/>

  <!-- Body -->
  <ellipse cx="50" cy="58" rx="22" ry="28" fill="#FFC107"/>

  <!-- Stripes -->
  <rect x="28" y="42" width="44" height="8" rx="4" fill="#3D3D3D"/>
  <rect x="28" y="56" width="44" height="8" rx="4" fill="#3D3D3D"/>
  <rect x="28" y="70" width="44" height="8" rx="4" fill="#3D3D3D"/>

  <!-- Wings -->
  <ellipse cx="30" cy="40" rx="14" ry="20" fill="rgba(255,255,255,0.9)" stroke="#DDD" stroke-width="1"/>
  <ellipse cx="70" cy="40" rx="14" ry="20" fill="rgba(255,255,255,0.9)" stroke="#DDD" stroke-width="1"/>

  <!-- Head -->
  <circle cx="50" cy="24" r="16" fill="#FFC107"/>

  <!-- Eyes -->
  <circle cx="43" cy="22" r="5" fill="#3D3D3D"/>
  <circle cx="57" cy="22" r="5" fill="#3D3D3D"/>
  <circle cx="44" cy="20" r="2" fill="white"/>
  <circle cx="58" cy="20" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M 43 30 Q 50 36 57 30" stroke="#3D3D3D" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Antennae -->
  <line x1="42" y1="10" x2="38" y2="2" stroke="#3D3D3D" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="10" x2="62" y2="2" stroke="#3D3D3D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="38" cy="2" r="4" fill="#3D3D3D"/>
  <circle cx="62" cy="2" r="4" fill="#3D3D3D"/>
</svg>
