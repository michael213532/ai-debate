<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Rounded Square Background -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bgGradient)"/>

  <!-- Bee 1 - Top Center -->
  <g transform="translate(100, 45) scale(0.7)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 2 - Left -->
  <g transform="translate(45, 95) scale(0.65)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 3 - Right -->
  <g transform="translate(155, 95) scale(0.65)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 4 - Bottom Left -->
  <g transform="translate(65, 155) scale(0.65)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 5 - Bottom Right -->
  <g transform="translate(135, 155) scale(0.65)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Chat bubbles connecting bees -->
  <circle cx="75" cy="65" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="125" cy="65" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="55" cy="125" r="5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="145" cy="125" r="5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="100" cy="115" r="7" fill="rgba(255,255,255,0.9)"/>

  <!-- Connection lines (conversation flow) -->
  <line x1="80" y1="68" x2="95" y2="108" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="120" y1="68" x2="105" y2="108" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="58" y1="120" x2="93" y2="115" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="142" y1="120" x2="107" y2="115" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
