<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Rounded Square Background -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bgGradient)"/>

  <!-- Bee 1 - Top Left, facing right -->
  <g transform="translate(55, 65) scale(0.7) rotate(15)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 2 - Top Right, facing left -->
  <g transform="translate(145, 70) scale(0.7) rotate(-10)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 3 - Bottom Left -->
  <g transform="translate(60, 140) scale(0.65) rotate(5)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bee 4 - Bottom Right -->
  <g transform="translate(140, 135) scale(0.65) rotate(-8)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="rgba(255,255,255,0.8)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="8" fill="#FFC107"/>
    <circle cx="-3" cy="-19" r="2" fill="#2D2D2D"/>
    <circle cx="3" cy="-19" r="2" fill="#2D2D2D"/>
    <line x1="-3" y1="-25" x2="-5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-25" x2="5" y2="-30" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Chat bubbles - casual placement -->
  <ellipse cx="95" cy="55" rx="12" ry="10" fill="rgba(255,255,255,0.9)"/>
  <ellipse cx="105" cy="100" rx="14" ry="11" fill="rgba(255,255,255,0.9)"/>
  <ellipse cx="95" cy="145" rx="10" ry="8" fill="rgba(255,255,255,0.9)"/>

  <!-- Little dots in bubbles to show typing/talking -->
  <circle cx="90" cy="55" r="2" fill="#6366f1"/>
  <circle cx="95" cy="55" r="2" fill="#6366f1"/>
  <circle cx="100" cy="55" r="2" fill="#6366f1"/>

  <circle cx="100" cy="100" r="2" fill="#8b5cf6"/>
  <circle cx="105" cy="100" r="2" fill="#8b5cf6"/>
  <circle cx="110" cy="100" r="2" fill="#8b5cf6"/>
</svg>
