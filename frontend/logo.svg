<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Hexagon Background -->
  <polygon points="100,10 175,55 175,145 100,190 25,145 25,55"
           fill="url(#bgGradient)"/>

  <!-- Bee Body -->
  <ellipse cx="100" cy="115" rx="28" ry="38" fill="#FFC107"/>

  <!-- Stripes -->
  <rect x="72" y="95" width="56" height="10" rx="5" fill="#2D2D2D"/>
  <rect x="72" y="115" width="56" height="10" rx="5" fill="#2D2D2D"/>
  <rect x="72" y="135" width="56" height="10" rx="5" fill="#2D2D2D"/>

  <!-- Wings -->
  <ellipse cx="65" cy="95" rx="22" ry="32" fill="rgba(255,255,255,0.85)" transform="rotate(-20 65 95)"/>
  <ellipse cx="135" cy="95" rx="22" ry="32" fill="rgba(255,255,255,0.85)" transform="rotate(20 135 95)"/>

  <!-- Head -->
  <circle cx="100" cy="62" r="22" fill="#FFC107"/>

  <!-- Eyes -->
  <circle cx="90" cy="58" r="6" fill="#2D2D2D"/>
  <circle cx="110" cy="58" r="6" fill="#2D2D2D"/>
  <circle cx="92" cy="56" r="2" fill="white"/>
  <circle cx="112" cy="56" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M 90 70 Q 100 78 110 70" stroke="#2D2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Antennae -->
  <line x1="88" y1="42" x2="80" y2="28" stroke="#2D2D2D" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="42" x2="120" y2="28" stroke="#2D2D2D" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="28" r="5" fill="#2D2D2D"/>
  <circle cx="120" cy="28" r="5" fill="#2D2D2D"/>
</svg>
