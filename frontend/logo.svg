<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Rounded Square Background -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bgGradient)"/>

  <!-- Bee 1 - Top Left, bigger, happy face -->
  <g transform="translate(55, 60) rotate(20)">
    <ellipse cx="0" cy="5" rx="18" ry="24" fill="#FFC107"/>
    <rect x="-18" y="-8" width="36" height="7" rx="3" fill="#2D2D2D"/>
    <rect x="-18" y="5" width="36" height="7" rx="3" fill="#2D2D2D"/>
    <rect x="-18" y="18" width="36" height="7" rx="3" fill="#2D2D2D"/>
    <ellipse cx="-16" cy="-8" rx="12" ry="18" fill="rgba(255,255,255,0.85)" transform="rotate(-25)"/>
    <ellipse cx="16" cy="-8" rx="12" ry="18" fill="rgba(255,255,255,0.85)" transform="rotate(25)"/>
    <circle cx="0" cy="-22" r="12" fill="#FFC107"/>
    <circle cx="-4" cy="-24" r="3" fill="#2D2D2D"/>
    <circle cx="4" cy="-24" r="3" fill="#2D2D2D"/>
    <circle cx="-3" cy="-25" r="1" fill="white"/>
    <circle cx="5" cy="-25" r="1" fill="white"/>
    <path d="M -4 -18 Q 0 -14 4 -18" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="-4" y1="-32" x2="-8" y2="-40" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="-32" x2="8" y2="-40" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-8" cy="-41" r="3" fill="#2D2D2D"/>
    <circle cx="8" cy="-41" r="3" fill="#2D2D2D"/>
  </g>

  <!-- Bee 2 - Top Right, medium, curious look -->
  <g transform="translate(150, 55) rotate(-15)">
    <ellipse cx="0" cy="5" rx="15" ry="20" fill="#FFD54F"/>
    <rect x="-15" y="-6" width="30" height="6" rx="3" fill="#2D2D2D"/>
    <rect x="-15" y="4" width="30" height="6" rx="3" fill="#2D2D2D"/>
    <rect x="-15" y="14" width="30" height="6" rx="3" fill="#2D2D2D"/>
    <ellipse cx="-12" cy="-6" rx="10" ry="15" fill="rgba(255,255,255,0.85)" transform="rotate(-20)"/>
    <ellipse cx="12" cy="-6" rx="10" ry="15" fill="rgba(255,255,255,0.85)" transform="rotate(20)"/>
    <circle cx="0" cy="-18" r="10" fill="#FFD54F"/>
    <circle cx="-4" cy="-19" r="3" fill="#2D2D2D"/>
    <circle cx="5" cy="-21" r="3" fill="#2D2D2D"/>
    <circle cx="-3" cy="-20" r="1" fill="white"/>
    <circle cx="6" cy="-22" r="1" fill="white"/>
    <line x1="-3" y1="-27" x2="-6" y2="-34" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-27" x2="7" y2="-35" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-6" cy="-35" r="2.5" fill="#2D2D2D"/>
    <circle cx="7" cy="-36" r="2.5" fill="#2D2D2D"/>
  </g>

  <!-- Bee 3 - Bottom Left, small and round -->
  <g transform="translate(50, 145) rotate(10)">
    <ellipse cx="0" cy="3" rx="14" ry="16" fill="#FFCA28"/>
    <rect x="-14" y="-6" width="28" height="5" rx="2" fill="#2D2D2D"/>
    <rect x="-14" y="3" width="28" height="5" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-11" cy="-4" rx="9" ry="13" fill="rgba(255,255,255,0.85)" transform="rotate(-25)"/>
    <ellipse cx="11" cy="-4" rx="9" ry="13" fill="rgba(255,255,255,0.85)" transform="rotate(25)"/>
    <circle cx="0" cy="-14" r="9" fill="#FFCA28"/>
    <circle cx="-3" cy="-15" r="2.5" fill="#2D2D2D"/>
    <circle cx="3" cy="-15" r="2.5" fill="#2D2D2D"/>
    <circle cx="-2" cy="-16" r="0.8" fill="white"/>
    <circle cx="4" cy="-16" r="0.8" fill="white"/>
    <ellipse cx="0" cy="-10" rx="3" ry="1.5" fill="#2D2D2D"/>
    <line x1="-3" y1="-22" x2="-5" y2="-28" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-22" x2="5" y2="-28" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-5" cy="-29" r="2" fill="#2D2D2D"/>
    <circle cx="5" cy="-29" r="2" fill="#2D2D2D"/>
  </g>

  <!-- Bee 4 - Bottom Right, tall and slim -->
  <g transform="translate(150, 150) rotate(-5)">
    <ellipse cx="0" cy="5" rx="12" ry="22" fill="#FFC107"/>
    <rect x="-12" y="-8" width="24" height="6" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="2" width="24" height="6" rx="2" fill="#2D2D2D"/>
    <rect x="-12" y="12" width="24" height="6" rx="2" fill="#2D2D2D"/>
    <ellipse cx="-10" cy="-6" rx="9" ry="14" fill="rgba(255,255,255,0.85)" transform="rotate(-20)"/>
    <ellipse cx="10" cy="-6" rx="9" ry="14" fill="rgba(255,255,255,0.85)" transform="rotate(20)"/>
    <circle cx="0" cy="-20" r="9" fill="#FFC107"/>
    <circle cx="-3" cy="-21" r="2.5" fill="#2D2D2D"/>
    <circle cx="3" cy="-21" r="2.5" fill="#2D2D2D"/>
    <circle cx="-2" cy="-22" r="0.8" fill="white"/>
    <circle cx="4" cy="-22" r="0.8" fill="white"/>
    <path d="M -3 -16 Q 0 -13 3 -16" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="-3" y1="-28" x2="-6" y2="-36" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-28" x2="6" y2="-36" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-6" cy="-37" r="2.5" fill="#2D2D2D"/>
    <circle cx="6" cy="-37" r="2.5" fill="#2D2D2D"/>
  </g>

  <!-- Central chat bubble -->
  <ellipse cx="100" cy="105" rx="22" ry="18" fill="rgba(255,255,255,0.95)"/>
  <circle cx="92" cy="105" r="3" fill="#6366f1"/>
  <circle cx="100" cy="105" r="3" fill="#8b5cf6"/>
  <circle cx="108" cy="105" r="3" fill="#a78bfa"/>
</svg>
