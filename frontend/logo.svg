<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>

  <!-- Hexagon outline (honeycomb reference) -->
  <polygon points="100,30 145,57.5 145,112.5 100,140 55,112.5 55,57.5"
           fill="none"
           stroke="rgba(255,255,255,0.15)"
           stroke-width="2"/>

  <!-- BEE #1 - Top -->
  <g transform="translate(100, 50)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="10" ry="14" fill="#FFB800"/>
    <!-- Stripes -->
    <rect x="-10" y="-7" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="-10" y="0" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="-10" y="7" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <!-- Wings -->
    <ellipse cx="-7" cy="-3" rx="8" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(-25 -7 -3)"/>
    <ellipse cx="7" cy="-3" rx="8" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(25 7 -3)"/>
    <!-- Head -->
    <circle cx="0" cy="-16" r="6" fill="#FFB800"/>
    <!-- Eyes -->
    <circle cx="-2" cy="-17" r="1.5" fill="#1a1a1a"/>
    <circle cx="2" cy="-17" r="1.5" fill="#1a1a1a"/>
    <!-- Antennae -->
    <line x1="-2" y1="-21" x2="-4" y2="-25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="-21" x2="4" y2="-25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-4" cy="-25" r="1.5" fill="#1a1a1a"/>
    <circle cx="4" cy="-25" r="1.5" fill="#1a1a1a"/>
    <!-- Speech bubble -->
    <circle cx="15" cy="-20" r="8" fill="rgba(255,255,255,0.9)"/>
    <polygon points="12,-15 10,-12 14,-14" fill="rgba(255,255,255,0.9)"/>
    <circle cx="15" cy="-20" r="1.5" fill="#6366f1"/>
  </g>

  <!-- BEE #2 - Bottom Left -->
  <g transform="translate(65, 125)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="10" ry="14" fill="#FFB800"/>
    <!-- Stripes -->
    <rect x="-10" y="-7" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="-10" y="0" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="-10" y="7" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <!-- Wings -->
    <ellipse cx="-7" cy="-3" rx="8" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(-25 -7 -3)"/>
    <ellipse cx="7" cy="-3" rx="8" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(25 7 -3)"/>
    <!-- Head -->
    <circle cx="0" cy="-16" r="6" fill="#FFB800"/>
    <!-- Eyes -->
    <circle cx="-2" cy="-17" r="1.5" fill="#1a1a1a"/>
    <circle cx="2" cy="-17" r="1.5" fill="#1a1a1a"/>
    <!-- Antennae -->
    <line x1="-2" y1="-21" x2="-4" y2="-25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="-21" x2="4" y2="-25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-4" cy="-25" r="1.5" fill="#1a1a1a"/>
    <circle cx="4" cy="-25" r="1.5" fill="#1a1a1a"/>
    <!-- Speech bubble -->
    <circle cx="-15" cy="-20" r="8" fill="rgba(255,255,255,0.9)"/>
    <polygon points="-12,-15 -10,-12 -14,-14" fill="rgba(255,255,255,0.9)"/>
    <circle cx="-15" cy="-20" r="1.5" fill="#8b5cf6"/>
  </g>

  <!-- BEE #3 - Bottom Right -->
  <g transform="translate(135, 125)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="10" ry="14" fill="#FFB800"/>
    <!-- Stripes -->
    <rect x="-10" y="-7" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="-10" y="0" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="-10" y="7" width="20" height="3" fill="#1a1a1a" rx="1.5"/>
    <!-- Wings -->
    <ellipse cx="-7" cy="-3" rx="8" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(-25 -7 -3)"/>
    <ellipse cx="7" cy="-3" rx="8" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(25 7 -3)"/>
    <!-- Head -->
    <circle cx="0" cy="-16" r="6" fill="#FFB800"/>
    <!-- Eyes -->
    <circle cx="-2" cy="-17" r="1.5" fill="#1a1a1a"/>
    <circle cx="2" cy="-17" r="1.5" fill="#1a1a1a"/>
    <!-- Antennae -->
    <line x1="-2" y1="-21" x2="-4" y2="-25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="-21" x2="4" y2="-25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-4" cy="-25" r="1.5" fill="#1a1a1a"/>
    <circle cx="4" cy="-25" r="1.5" fill="#1a1a1a"/>
    <!-- Speech bubble -->
    <circle cx="15" cy="-20" r="8" fill="rgba(255,255,255,0.9)"/>
    <polygon points="12,-15 10,-12 14,-14" fill="rgba(255,255,255,0.9)"/>
    <circle cx="15" cy="-20" r="1.5" fill="#a78bfa"/>
  </g>

  <!-- Connecting lines (showing discussion) -->
  <line x1="100" y1="64" x2="75" y2="105" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="100" y1="64" x2="125" y2="105" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="75" y1="109" x2="125" y2="109" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="3,3"/>
</svg>
